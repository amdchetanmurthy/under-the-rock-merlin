name: mpifoe-tests
description: "MPIFoE firmware test project for MI450"
jira:
  systest_tracker: FWDEV
  component: mpifoe-fw

platform:
  card_cli: xncmdclient
  card_cli_args: ""
  firmware_type: mpifoe
  asic: mi450

nfs:
  bundle_pattern: "/proj/smartnic/xcb/ifoe/simnow/*.sbin"
  fw_binary_pattern: "build/fw.mi450-a0.*/zephyr/mpifoe_fw.hbin"

simnow:
  launch_script: "/proj/smartnic/xcb/ifoe/simnow/sim111.sh"
  launch_script_dual: "/proj/smartnic/xcb/ifoe/simnow/222.sh"
  workspace: "/scratch/${USER}/simnow"

build:
  command: "./scripts/build.py -p simnow --eftest"
  source_dir: "/scratch/${USER}/mpifoe-fw"

test_suites:
  sanity:
    test_cases:
      - sanity/fw-version
      - sanity/fw-uptime
      - sanity/config-phase
      - sanity/port-enum

  bringup:
    test_cases:
      - sanity/*
      - bringup/*

  full-validation:
    test_cases:
      - sanity/*
      - bringup/*
      - functional/*
      - stress/*
      - ras/*

  nightly:
    test_cases:
      - sanity/*
      - bringup/*
      - functional/*
      - ras/*

validation_groups:
  pre-test:
    validations:
      - fw-heartbeat-check
      - ifoe-link-check

  post-test:
    validations:
      - error-log-check
      - telemetry-check

  full:
    validations:
      - fw-heartbeat-check
      - ifoe-link-check
      - telemetry-check
      - error-log-check
